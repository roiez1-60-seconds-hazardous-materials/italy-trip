// ===== CREATE MAP =====
function mkMap(container,d,addRoute=true){
  const map=new mapboxgl.Map({container,style:'mapbox://styles/mapbox/outdoors-v12',center:d.center,zoom:d.zoom,interactive:true,attributionControl:false});
  map.addControl(new mapboxgl.NavigationControl({showCompass:false}),'top-left');
  map.on('load',()=>{
    // Markers with popups
    d.pts.forEach((p,i)=>{
      const el=document.createElement('div');
      el.style.cssText=`width:30px;height:30px;border-radius:50%;background:${d.cl};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:2.5px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.35);cursor:pointer;transition:transform .2s`;
      el.textContent=i+1;
      el.onmouseenter=()=>el.style.transform='scale(1.2)';
      el.onmouseleave=()=>el.style.transform='scale(1)';
      const name=d.pn&&d.pn[i]?d.pn[i]:`נקודה ${i+1}`;
      const navUrl=`https://www.google.com/maps/dir/?api=1&destination=${p[1]},${p[0]}&travelmode=driving`;
      const popup=new mapboxgl.Popup({offset:20,closeButton:true,maxWidth:'220px'})
        .setHTML(`<div style="font-family:Heebo,sans-serif;text-align:center;padding:4px 0"><div style="font-size:14px;font-weight:800;color:#333;margin-bottom:6px">${name}</div><a href="${navUrl}" target="_blank" style="display:inline-block;padding:6px 14px;background:${d.cl};color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">🧭 נווט לכאן</a></div>`);
      new mapboxgl.Marker(el).setLngLat(p).setPopup(popup).addTo(map);
    });
    // Route line
    if(addRoute&&d.pts.length>=2){
      const coords=d.pts.map(p=>p.join(',')).join(';');
      fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${coords}?geometries=geojson&overview=full&access_token=${MBT}`)
        .then(r=>r.json()).then(data=>{
          if(data.routes&&data.routes[0]){
            map.addSource('route',{type:'geojson',data:{type:'Feature',geometry:data.routes[0].geometry}});
            map.addLayer({id:'route',type:'line',source:'route',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':d.cl,'line-width':4,'line-opacity':.8}});
          }
        }).catch(()=>{
          // Fallback: straight lines
          map.addSource('route',{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:d.pts}}});
          map.addLayer({id:'route',type:'line',source:'route',paint:{'line-color':d.cl,'line-width':3,'line-dasharray':[2,2]}});
        });
    }
  });
  return map;
}
