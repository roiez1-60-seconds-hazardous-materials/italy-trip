function toggleFS(id){
  const w=document.getElementById(id);
  const opening=!w.classList.contains('exp');
  if(opening){
    w._origParent=w.parentNode;
    w._origNext=w.nextSibling;
    // Create overlay on <html> element - OUTSIDE the 430px body!
    let ov=document.getElementById('_fsOv');
    if(!ov){
      ov=document.createElement('div');
      ov.id='_fsOv';
      ov.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:99999;background:#000';
      document.documentElement.appendChild(ov);
    }
    ov.style.display='block';
    ov.appendChild(w);
    w.classList.add('exp');
    document.body.style.overflow='hidden';
  }else{
    w.classList.remove('exp');
    const ov=document.getElementById('_fsOv');
    if(ov)ov.style.display='none';
    document.body.style.overflow='';
    if(w._origParent){
      if(w._origNext)w._origParent.insertBefore(w,w._origNext);
      else w._origParent.appendChild(w);
    }
  }
  const doResize=()=>{
    const me=w.querySelector('.mapboxgl-map');
    if(me&&me.__mbMap)me.__mbMap.resize();
    if(dayMap)dayMap.resize();
    if(window._overviewMap)window._overviewMap.resize();
  };
  setTimeout(doResize,50);
  setTimeout(doResize,300);
  setTimeout(doResize,600);
}

function flyTo(idx){
  const d=DAYS[cDay],s=d.sc[idx];if(!s.ln)return;activeSch=idx;
  document.querySelectorAll('.sch-item').forEach((el,i)=>el.classList.toggle('on',i===idx));
  dayMarkers.forEach(m=>{const el=m.getElement();if(el)el.classList.toggle('on',m._si===idx)});
  if(dayMap){dayMap.flyTo({center:s.ln,zoom:Math.max(dayMap.getZoom(),14),duration:1200,essential:true});
  if(dayPopup)dayPopup.remove();
  const ph=getPhoto(s.a);
  dayPopup=new mapboxgl.Popup({offset:25,closeButton:true,className:'map-popup',maxWidth:'220px'}).setLngLat(s.ln)
    .setHTML(`<div style="font-weight:800;font-size:13px;margin-bottom:2px">${s.i} ${s.a}</div>${s.d?'<div style="font-size:11px;color:#666">'+s.d+'</div>':''}${ph?'<img src="'+ph[0]+'" style="width:100%;height:80px;object-fit:cover;border-radius:8px;margin-top:6px" >':''}`)
    .addTo(dayMap);}
}

function mkDayMap(cid,d){
  if(dayMap){dayMap.remove();dayMap=null}dayMarkers=[];dayPopup=null;activeSch=-1;
  const map=new mapboxgl.Map({container:cid,style:'mapbox://styles/mapbox/outdoors-v12',center:d.center,zoom:d.zoom,interactive:true,attributionControl:false});
  map.addControl(new mapboxgl.NavigationControl({showCompass:false}),'top-left');dayMap=map;
  document.getElementById(cid).__mbMap=map;
  map.on('load',()=>{const pts=[];
  d.sc.forEach((s,i)=>{if(!s.ln)return;pts.push(s.ln);
    const el=document.createElement('div');el.className='mkr';el.style.cssText=`background:${d.cl}`;el.textContent=i+1;el.onclick=()=>flyTo(i);
    const m=new mapboxgl.Marker(el).setLngLat(s.ln).addTo(map);m._si=i;dayMarkers.push(m);});
  if(pts.length>=2){const c=pts.map(p=>p.join(',')).join(';');
    fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${c}?geometries=geojson&overview=full&access_token=${MBT}`)
    .then(r=>r.json()).then(data=>{if(data.routes&&data.routes[0]){
      map.addSource('rt',{type:'geojson',data:{type:'Feature',geometry:data.routes[0].geometry}});
      map.addLayer({id:'rtb',type:'line',source:'rt',paint:{'line-color':'#fff','line-width':6,'line-opacity':.7}});
      map.addLayer({id:'rt',type:'line',source:'rt',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':d.cl,'line-width':3.5}});
    }}).catch(()=>{});}});
}

// COUNTDOWN
function countdown(){
  const now=new Date(),diff=TRIP_DATE-now;
  if(diff<=0)return'рЯОЙ „Ф„Ш„Щ„Х„Ь „Ф„™„Ч„Щ„Ь!';
  const d=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5);
  return `${d} „Щ„Ю„Щ„Э ${h} „©„Ґ„Х„™`;
}

async function fetchWx(lat,lon,el){
