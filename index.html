// ===== CREATE MAP =====
function mkMap(container,d,addRoute=true){
  const map=new mapboxgl.Map({container,style:'mapbox://styles/mapbox/outdoors-v12',center:d.center,zoom:d.zoom,interactive:true,attributionControl:false});
  map.addControl(new mapboxgl.NavigationControl({showCompass:false}),'top-left');
  map.on('load',()=>{
    // Markers
    d.pts.forEach((p,i)=>{
      const el=document.createElement('div');
      el.style.cssText=`width:28px;height:28px;border-radius:50%;background:${d.cl};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)`;
      el.textContent=i+1;
      new mapboxgl.Marker(el).setLngLat(p).addTo(map);
    });
    // Route line
    if(addRoute&&d.pts.length>=2){
      const coords=d.pts.map(p=>p.join(',')).join(';');
      fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${coords}?geometries=geojson&overview=full&access_token=${MBT}`)
        .then(r=>r.json()).then(data=>{
          if(data.routes&&data.routes[0]){
            map.addSource('route',{type:'geojson',data:{type:'Feature',geometry:data.routes[0].geometry}});
            map.addLayer({id:'route',type:'line',source:'route',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':d.cl,'line-width':4,'line-opacity':.8}});
          }
        }).catch(()=>{
          // Fallback: straight lines
          map.addSource('route',{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:d.pts}}});
          map.addLayer({id:'route',type:'line',source:'route',paint:{'line-color':d.cl,'line-width':3,'line-dasharray':[2,2]}});
        });

}

// ===== OVERVIEW MAP =====
function mkOverview(container){
  const allPts=[[8.728,45.623],[9.192,45.464],[9.077,45.808],[8.951,45.954],[9.664,45.705],[11.671,46.575],[11.350,46.500],[10.735,45.506],[10.994,45.439],[10.608,45.493],[10.813,45.766]];
  const map=new mapboxgl.Map({container,style:'mapbox://styles/mapbox/outdoors-v12',center:[10.2,45.9],zoom:7,interactive:true,attributionControl:false});
  map.addControl(new mapboxgl.NavigationControl({showCompass:false}),'top-left');
  map.on('load',()=>{
    const labels=['ЧһЧңЧӨЧ ЧЎЧ”','ЧһЧҷЧңЧҗЧ Ч•','Ч§Ч•ЧһЧ•','Ч©Ч•Ч•ЧҷЧҘ','Ч‘ЧЁЧ’ЧһЧ•','ЧҗЧ•ЧЁЧҳЧҷЧ–ЧҷЧҷ','Ч‘Ч•ЧңЧҰЧҗЧ Ч•','ЧңЧҗЧҰЧҷЧ–Ч”','Ч•ЧЁЧ•Ч Ч”','ЧЎЧҷЧЁЧһЧҷЧ•Ч Ч”','Monte Baldo'];
    const colors=['#FF6B6B','#FF6B6B','#4ECDC4','#e74c3c','#45B7D1','#45B7D1','#45B7D1','#96CEB4','#96CEB4','#96CEB4','#96CEB4'];
    allPts.forEach((p,i)=>{
      const el=document.createElement('div');
      el.style.cssText=`background:${colors[i]};color:#fff;padding:2px 6px;border-radius:8px;font-size:10px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);white-space:nowrap;font-family:Heebo,sans-serif`;
      el.textContent=labels[i];
      new mapboxgl.Marker(el).setLngLat(p).addTo(map);
    });
    // Route through all bases
    const bases=[[8.728,45.623],[9.192,45.464],[9.077,45.808],[8.951,45.954],[9.664,45.705],[11.671,46.575],[11.350,46.500],[10.735,45.506],[8.728,45.623]];
    const coords=bases.map(p=>p.join(',')).join(';');
    fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${coords}?geometries=geojson&overview=full&access_token=${MBT}`)
      .then(r=>r.json()).then(data=>{
        if(data.routes&&data.routes[0]){
          map.addSource('fullroute',{type:'geojson',data:{type:'Feature',geometry:data.routes[0].geometry}});
          map.addLayer({id:'fullroute',type:'line',source:'fullroute',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#1F4E79','line-width':3.5,'line-opacity':.7}});
        }
      }).catch(()=>{});
  });
}
