<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--b:#1F4E79;--lb:#2E75B6;--bg:#F5F6F8}
html{scroll-behavior:smooth}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:#333;max-width:430px;margin:0 auto;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}a{text-decoration:none;color:inherit}
.hide{display:none!important}

.hdr{position:sticky;top:0;z-index:50;background:rgba(245,246,248,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.05);padding:max(env(safe-area-inset-top),10px) 16px 10px;text-align:center}
.hdr h1{font-size:15px;font-weight:800;color:var(--b)}

.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,.06);display:flex;justify-content:space-around;padding:6px 0 max(env(safe-area-inset-bottom),10px);z-index:100}
.tb{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 14px;opacity:.38;transition:all .25s;font-size:10px;font-weight:700;color:#888}
.tb.on{opacity:1;transform:scale(1.12);color:var(--b)}
.tb i{font-size:24px;font-style:normal}

/* MAP */
.map-wrap{position:relative;width:calc(100% - 32px);margin:0 auto 12px;border-radius:16px;overflow:hidden;border:2px solid rgba(0,0,0,.08)}
.map-wrap .mapboxgl-map{width:100%;height:280px;transition:height .4s ease}
.map-wrap.expanded{position:fixed!important;inset:0;width:100%!important;margin:0!important;border-radius:0!important;border:none!important;z-index:200}
.map-wrap.expanded .mapboxgl-map{height:100vh!important;height:100dvh!important}
.fs-btn{position:absolute;top:10px;right:10px;z-index:10;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border:1px solid rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.fs-btn:active{transform:scale(.9)}
.close-fs{position:absolute;top:max(env(safe-area-inset-top),12px);right:12px;z-index:210;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;font-size:22px;display:none;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px)}
.map-wrap.expanded .close-fs{display:flex}
.map-wrap.expanded .fs-btn{display:none}
.map-label{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border-radius:10px;padding:6px 10px;font-size:11px;text-align:center;font-weight:600;z-index:5;backdrop-filter:blur(4px);transition:opacity .3s}
.map-wrap.expanded .map-label{display:none}

/* ACTIVE INDICATOR ON MAP */
.map-popup{font-family:'Heebo',sans-serif!important;direction:rtl;text-align:right}
.map-popup .mapboxgl-popup-content{border-radius:12px;padding:10px 14px;box-shadow:0 4px 20px rgba(0,0,0,.2);max-width:200px}
.map-popup .pop-t{font-size:13px;font-weight:800;margin-bottom:2px}
.map-popup .pop-d{font-size:11px;color:#666}

/* SCHEDULE */
.sch-item{display:flex;gap:10px;margin-bottom:2px;padding:8px 0;border-radius:12px;transition:all .25s;cursor:pointer;position:relative}
.sch-item:active{transform:scale(.98)}
.sch-item.active{background:rgba(0,0,0,.04);padding:8px 10px;margin:0 -10px 2px}
.sch-item.active .sch-act{color:var(--accent)}
.sch-dot{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.sch-ico{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .25s}
.sch-item.active .sch-ico{transform:scale(1.15);box-shadow:0 2px 10px rgba(0,0,0,.15)}
.sch-line{width:2px;flex:1;margin-top:3px}
.sch-time{font-size:10px;font-weight:700;flex-shrink:0}
.sch-act{font-size:13px;font-weight:700;transition:color .2s}
.sch-det{font-size:11px;color:#777;line-height:1.4;margin-top:1px}
.sch-lnk{font-size:11px;font-weight:600;display:inline-block;margin-top:3px}

/* PULSE DOT on map marker */
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.7)}70%{box-shadow:0 0 0 12px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
.marker{border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.3);transition:all .3s}
.marker.active{animation:pulse 1.5s infinite;transform:scale(1.3)}

/* DAY SELECTOR */
.dsel{display:flex;overflow-x:auto;gap:5px;padding:10px 10px 6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.dsel::-webkit-scrollbar{display:none}
.dsel button{min-width:44px;height:44px;border-radius:12px;border:1px solid #ddd;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-family:inherit}
.dsel button.on{border-width:2.5px}

/* HERO */
.hero{padding:20px 16px 16px;color:#fff;text-align:center}
.hero .ico{font-size:38px}.hero h2{font-size:22px;font-weight:900;margin:4px 0 2px}.hero .sub{font-size:12px;opacity:.85}
.hero .stats{display:flex;justify-content:center;gap:20px;margin-top:10px}
.hero .stats .l{font-size:10px;opacity:.65}.hero .stats .v{font-size:12px;font-weight:700}

/* MISC */
.lrow{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#fff;border:1px solid #eee;border-radius:12px;margin-bottom:6px}
.lrow:active{background:#f8f8f8}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.bc{border-radius:16px;padding:12px 10px;text-align:center;border:2px solid}
.total{border-radius:20px;padding:22px 18px;color:#fff;text-align:center;margin-bottom:20px}
.bbar{background:#f0f0f0;border-radius:6px;height:10px;overflow:hidden;margin:3px 0 2px}
.bbar-f{height:100%;border-radius:6px;transition:width 1s}
.alert{border-radius:14px;padding:14px;margin-bottom:12px}
.brow{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid #eee;border-radius:14px;margin-bottom:8px}
.brow:active{opacity:.8}
.badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:800;flex-shrink:0}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page>*{animation:fadeIn .3s ease both}
.page>*:nth-child(2){animation-delay:.04s}.page>*:nth-child(3){animation-delay:.08s}
</style>

let cTab='H',cDay=0,dayMap=null,dayMarkers=[],dayPopup=null,activeSch=-1;

function go(t){cTab=t;['H','D','B','I'].forEach(x=>document.getElementById('p'+x).classList.toggle('hide',x!==t));
document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('on',['H','D','B','I'][i]===t));
const ts={H:'🇮🇹 צוקרמניה באיטליה',D:`${DAYS[cDay].ic} יום ${cDay+1} — ${DAYS[cDay].t}`,B:'💰 תקציב',I:'📋 מידע'};
document.getElementById('hdrT').textContent=ts[t];window.scrollTo(0,0);if(t==='D')rD();}
function gD(i){cDay=i;go('D')}

// ===== TOGGLE FULLSCREEN MAP =====
function toggleFS(id){
  const w=document.getElementById(id);
  w.classList.toggle('expanded');
  document.body.style.overflow=w.classList.contains('expanded')?'hidden':'';
  if(dayMap)setTimeout(()=>dayMap.resize(),100);
}

// ===== FLY TO SCHEDULE ITEM =====
function flyTo(idx){
  const d=DAYS[cDay];
  const s=d.sc[idx];
  if(!s.ln)return;
  activeSch=idx;
  // Update active styling
  document.querySelectorAll('.sch-item').forEach((el,i)=>{el.classList.toggle('active',i===idx)});
  // Update markers
  dayMarkers.forEach((m,i)=>{
    const el=m.getElement();
    if(el){el.classList.toggle('active',m._schIdx===idx)}
  });
  // Fly map
  if(dayMap){
    dayMap.flyTo({center:s.ln,zoom:Math.max(dayMap.getZoom(),13),duration:1200,essential:true});
    // Show popup
    if(dayPopup)dayPopup.remove();
    dayPopup=new mapboxgl.Popup({offset:25,closeButton:false,className:'map-popup',maxWidth:'200px'})
      .setLngLat(s.ln)
      .setHTML(`<div class="pop-t">${s.i} ${s.a}</div>${s.d?'<div class="pop-d">'+s.d+'</div>':''}`)
      .addTo(dayMap);
  }
}

// ===== CREATE DAY MAP =====
function mkDayMap(containerId,d){
  if(dayMap){dayMap.remove();dayMap=null}
  dayMarkers=[];dayPopup=null;activeSch=-1;
  const map=new mapboxgl.Map({container:containerId,style:'mapbox://styles/mapbox/outdoors-v12',center:d.center,zoom:d.zoom,interactive:true,attributionControl:false});
  map.addControl(new mapboxgl.NavigationControl({showCompass:false}),'top-left');
  dayMap=map;
  map.on('load',()=>{
    // Add markers for each schedule item with coords
    const pts=[];
    d.sc.forEach((s,i)=>{
      if(!s.ln)return;
      pts.push(s.ln);
      const el=document.createElement('div');
      el.className='marker';
      el.style.cssText=`width:30px;height:30px;background:${d.cl};`;
      el.textContent=i+1;
      el.onclick=()=>flyTo(i);
      el._schIdx=i;
      const m=new mapboxgl.Marker(el).setLngLat(s.ln).addTo(map);
      m._schIdx=i;
      dayMarkers.push(m);
    });
    // Draw route
    if(pts.length>=2){
      const coords=pts.map(p=>p.join(',')).join(';');
      fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${coords}?geometries=geojson&overview=full&access_token=${MBT}`)
        .then(r=>r.json()).then(data=>{
          if(data.routes&&data.routes[0]){
            map.addSource('rt',{type:'geojson',data:{type:'Feature',geometry:data.routes[0].geometry}});
            map.addLayer({id:'rt-bg',type:'line',source:'rt',paint:{'line-color':'#fff','line-width':6,'line-opacity':.8}});
            map.addLayer({id:'rt',type:'line',source:'rt',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':d.cl,'line-width':3.5,'line-opacity':.85}});
          }
        }).catch(()=>{});
    }
  });
}

  h+=`<div style="margin:12px 16px;padding:10px 14px;background:${d.cl}10;border:1px solid ${d.cl}25;border-radius:12px"><div style="font-size:12px;font-weight:700;color:${d.cl}">🛣️ מסלול</div><div style="font-size:12px;color:#555;margin-top:2px">${d.rt}</div></div>`;
  // MAP with fullscreen
  h+=`<div class="map-wrap" id="mwDay" style="margin:0 16px 12px"><button class="fs-btn" onclick="toggleFS('mwDay')">⛶</button><button class="close-fs" onclick="toggleFS('mwDay')">✕</button><div id="mapDay"></div><div class="map-label">📍 לחצו על פעילות בלו"ז → המפה תעוף למיקום!</div></div>`;
  // SCHEDULE
  h+=`<div style="padding:0 16px"><h3 style="font-size:15px;font-weight:800;margin-bottom:10px;text-align:right">📋 לו"ז — לחצו לניווט במפה</h3>`;
  d.sc.forEach((s,i)=>{
    const hasLoc=!!s.ln;
    h+=`<div class="sch-item${hasLoc?' clickable':''}" onclick="${hasLoc?'flyTo('+i+')':''}" style="${hasLoc?'cursor:pointer':'cursor:default'};--accent:${d.cl}"><div class="sch-dot"><div class="sch-ico" style="background:${d.cl}12">${s.i}</div>${i<d.sc.length-1?`<div class="sch-line" style="background:${d.cl}18"></div>`:''}</div><div style="flex:1"><div style="display:flex;justify-content:space-between"><span class="sch-act">${s.a}${hasLoc?' 📍':''}</span><span class="sch-time" style="color:${d.cl}">${s.t}</span></div>${s.d?`<p class="sch-det">${s.d}</p>`:''}${s.u?`<a href="${s.u}" target="_blank" class="sch-lnk" style="color:${d.cl}" onclick="event.stopPropagation()">🔗 כרטיסים / אתר</a>`:''}</div></div>`;
  });
  h+=`</div>`;
  // Links
  if(d.lk.length){h+=`<div style="padding:8px 16px 0"><h3 style="font-size:15px;font-weight:800;margin-bottom:8px;text-align:right">🔗 קישורים</h3>`;d.lk.forEach(l=>{h+=`<a href="${l.u}" target="_blank" class="lrow"><span style="font-size:13px;font-weight:600">${l.n}</span><span style="font-size:10px;color:${d.cl};font-weight:600">פתח →</span></a>`});h+=`</div>`}
  // Stay
  if(d.stay){h+=`<div style="margin:12px 16px 0;padding:14px;background:${d.cl}06;border:1px solid ${d.cl}18;border-radius:14px"><div style="font-size:13px;font-weight:800">🏠 לינה</div><div style="font-size:12px;color:#666;margin-top:2px">${d.stay}</div></div>`}
  el.innerHTML=h;
  setTimeout(()=>mkDayMap('mapDay',d),150);
}

  BDG.forEach((b,i)=>{const p=(b.a/tot*100);h+=`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:14px;font-weight:700">${b.i} ${b.c}</span><span style="font-size:14px;font-weight:800;color:#1F4E79">€${b.a.toLocaleString()}</span></div><div class="bbar"><div class="bbar-f" style="background:hsl(${210-i*25},60%,50%);width:${p}%"></div></div><div style="font-size:10px;color:#aaa">${b.d}</div></div>`});

}
