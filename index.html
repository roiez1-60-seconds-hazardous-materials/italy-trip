function flyTo(idx){
  const d=DAYS[cDay],s=d.sc[idx];if(!s.ln)return;activeSch=idx;
  document.querySelectorAll('.sch-item').forEach((el,i)=>el.classList.toggle('on',i===idx));
  dayMarkers.forEach(m=>{const el=m.getElement();if(el)el.classList.toggle('on',m._si===idx)});
  if(dayMap){dayMap.flyTo({center:s.ln,zoom:Math.max(dayMap.getZoom(),14),duration:1200,essential:true});
  if(dayPopup)dayPopup.remove();
  const ph=getPhoto(s.a);
  dayPopup=new mapboxgl.Popup({offset:25,closeButton:true,className:'map-popup',maxWidth:'220px'}).setLngLat(s.ln)
    .setHTML(`<div style="font-weight:800;font-size:13px;margin-bottom:2px">${s.i} ${s.a}</div>${s.d?'<div style="font-size:11px;color:#666">'+s.d+'</div>':''}${ph?'<img src="'+ph[0]+'" style="width:100%;height:80px;object-fit:cover;border-radius:8px;margin-top:6px" onerror="this.style.display='none'">':''}`)
    .addTo(dayMap);}
}

function mkDayMap(cid,d){
  if(dayMap){dayMap.remove();dayMap=null}dayMarkers=[];dayPopup=null;activeSch=-1;
  const map=new mapboxgl.Map({container:cid,style:'mapbox://styles/mapbox/outdoors-v12',center:d.center,zoom:d.zoom,interactive:true,attributionControl:false});
  map.addControl(new mapboxgl.NavigationControl({showCompass:false}),'top-left');dayMap=map;
  map.on('load',()=>{const pts=[];
  d.sc.forEach((s,i)=>{if(!s.ln)return;pts.push(s.ln);
    const el=document.createElement('div');el.className='mkr';el.style.cssText=`background:${d.cl}`;el.textContent=i+1;el.onclick=()=>flyTo(i);
    const m=new mapboxgl.Marker(el).setLngLat(s.ln).addTo(map);m._si=i;dayMarkers.push(m);});
  if(pts.length>=2){const c=pts.map(p=>p.join(',')).join(';');
    fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${c}?geometries=geojson&overview=full&access_token=${MBT}`)
    .then(r=>r.json()).then(data=>{if(data.routes&&data.routes[0]){
      map.addSource('rt',{type:'geojson',data:{type:'Feature',geometry:data.routes[0].geometry}});
      map.addLayer({id:'rtb',type:'line',source:'rt',paint:{'line-color':'#fff','line-width':6,'line-opacity':.7}});
      map.addLayer({id:'rt',type:'line',source:'rt',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':d.cl,'line-width':3.5}});
    }}).catch(()=>{});}});
}

// COUNTDOWN
function countdown(){
  const now=new Date(),diff=TRIP_DATE-now;
  if(diff<=0)return'🎉 הטיול התחיל!';
  const d=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5);
  return `${d} ימים ${h} שעות`;
}

// WEATHER
async function fetchWx(lat,lon,el){
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe/Rome&forecast_days=3`);
    const data=await r.json();
    const wc={'0':'☀️','1':'🌤️','2':'⛅','3':'☁️','45':'🌫️','48':'🌫️','51':'🌧️','53':'🌧️','55':'🌧️','61':'🌧️','63':'🌧️','65':'🌧️','71':'❄️','73':'❄️','80':'🌦️','81':'🌦️','95':'⛈️'};
    let h='';data.daily.time.forEach((t,i)=>{
      const code=data.daily.weathercode[i];const icon=wc[code]||'🌤️';
      h+=`<div class="wx-card"><div style="font-size:10px;color:#888">${t.slice(5)}</div><div style="font-size:20px">${icon}</div><div style="font-size:12px;font-weight:700">${Math.round(data.daily.temperature_2m_max[i])}°</div><div style="font-size:10px;color:#888">${Math.round(data.daily.temperature_2m_min[i])}°</div></div>`;
    });el.innerHTML=h;
  }catch(e){el.innerHTML='<div style="font-size:11px;color:#999">מזג אוויר לא זמין</div>';}
}

// CURRENCY
async function fetchRates(){
  try{const r=await fetch('https://open.er-api.com/v6/latest/EUR');const d=await r.json();return{CHF:d.rates.CHF,ILS:d.rates.ILS};}
  catch(e){return{CHF:0.93,ILS:3.95};}
}

// WHATSAPP SHARE
function shareWA(day){
  const d=DAYS[day];
  let msg=`🇮🇹 *צוקרמניה באיטליה — יום ${d.day}*\n📅 ${d.dt}\n${d.ic} *${d.t}*\n🛣️ ${d.rt}\n💰 ${d.cost}\n\n📋 *לו"ז:*\n`;
  d.sc.forEach(s=>{msg+=`${s.t} ${s.i} ${s.a}\n`});
  msg+=`\n🏠 ${d.stay||''}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

function rB(){
  const el=document.getElementById('pB');const tot=BDG.reduce((s,b)=>s+b.a,0);
  let h=`<div class="total" style="background:linear-gradient(135deg,#1F4E79,#2E75B6)"><div style="font-size:12px;opacity:.75">סה"כ (ללא טיסות)</div><div style="font-size:42px;font-weight:900">€${tot.toLocaleString()}</div></div>`;
  BDG.forEach((b,i)=>{const p=(b.a/tot*100);h+=`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:14px;font-weight:700">${b.i} ${b.c}</span><span style="font-size:14px;font-weight:800;color:#1F4E79">€${b.a.toLocaleString()}</span></div><div class="bbar"><div class="bbar-f" style="background:hsl(${210-i*25},60%,50%);width:${p}%"></div></div></div>`});
  // CURRENCY CONVERTER
  h+=`<div class="card"><h3 style="font-size:15px;font-weight:800;margin-bottom:10px">💱 מחשבון מטבעות</h3><div style="display:flex;gap:8px;margin-bottom:10px"><input type="number" id="ccAmt" value="100" style="flex:1;padding:10px;border:2px solid #ddd;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;text-align:center" oninput="calcCC()"><select id="ccFrom" style="padding:10px;border:2px solid #ddd;border-radius:12px;font-size:14px;font-family:inherit" onchange="calcCC()"><option value="EUR">🇪🇺 EUR</option><option value="CHF">🇨🇭 CHF</option><option value="ILS">🇮🇱 ILS</option></select></div><div id="ccResult" style="text-align:center;font-size:14px;color:#666">טוען שערים...</div></div>`;
  el.innerHTML=h;
  loadRates();
}

let rates={};
async function loadRates(){rates=await fetchRates();calcCC();}
function calcCC(){
  const amt=parseFloat(document.getElementById('ccAmt').value)||0;
  const from=document.getElementById('ccFrom').value;
  const r=document.getElementById('ccResult');
  if(!rates.CHF){r.textContent='טוען...';return;}
  let eur=amt;
  if(from==='CHF')eur=amt/rates.CHF;
  else if(from==='ILS')eur=amt/rates.ILS;
  r.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">${[
    {c:'🇪🇺',v:eur.toFixed(1),l:'EUR'},
    {c:'🇨🇭',v:(eur*rates.CHF).toFixed(1),l:'CHF'},
    {c:'🇮🇱',v:(eur*rates.ILS).toFixed(1),l:'ILS'}
  ].map(x=>`<div style="background:#F8F9FA;border-radius:10px;padding:8px"><div style="font-size:10px;color:#888">${x.c} ${x.l}</div><div style="font-size:18px;font-weight:800;color:#1F4E79">${x.v}</div></div>`).join('')}</div>`;
}

  CHECKLIST.forEach((cat,ci)=>{
    h+=`<div class="card"><h3 style="font-size:14px;font-weight:800;margin-bottom:8px">${cat.cat}</h3>`;

      const key=`${ci}-${ii}`;const done=checked[key];

    h+=`<a href="${v}" target="_blank" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0"><span style="font-size:20px;width:32px;height:32px;border-radius:50%;background:#1DB954;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px">🎵</span><div style="flex:1;font-size:13px;font-weight:600">${k}</div><span style="font-size:10px;color:#1DB954;font-weight:600">Spotify →</span></a>`;
  });h+=`</div>`;
  el.innerHTML=h;
}

function toggleChk(key){checked[key]=!checked[key];saveCk();rT();}
