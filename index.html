<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A1628">
<title>🇮🇹 צוקרמניה באיטליה 2026</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAF7F2;--bg2:#F3EDE4;
  --navy:#0A1628;--navy2:#142238;--gold:#D4A853;--gold2:#C49A42;--goldL:#F5E6C8;
  --txt:#1A1A2E;--txt2:#4A4A5A;--txt3:#8A8A9A;
  --glass:rgba(255,255,255,.72);--glass2:rgba(255,255,255,.45);
  --shadow:0 8px 32px rgba(10,22,40,.08);--shadow2:0 4px 16px rgba(10,22,40,.06);
  --r:20px;--r2:14px;--r3:10px;
  --blur:saturate(180%) blur(20px);
  --milan:#E8666A;--como:#3ABFAD;--dolo:#4A9BD9;--garda:#7BAE7F;--venice:#1E3A5F;--swiss:#D94040;
}
html{scroll-behavior:smooth}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);max-width:720px;margin:0 auto;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;position:relative}
/* Grain texture overlay */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E")}
button{font-family:inherit;cursor:pointer}a{text-decoration:none;color:inherit}
.hide{display:none!important}
h1,h2,h3,.display{font-family:'Playfair Display','Heebo',serif}

/* HEADER — frosted glass */
.hdr{position:sticky;top:0;z-index:50;background:rgba(250,247,242,.85);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid rgba(212,168,83,.15);padding:max(env(safe-area-inset-top),12px) 16px 10px;text-align:center}
.hdr h1{font-size:14px;font-weight:700;color:var(--navy);font-family:'Heebo',sans-serif;letter-spacing:.3px}

/* TABS — gold accent, frosted */
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(250,247,242,.88);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-top:1px solid rgba(212,168,83,.12);display:flex;justify-content:space-around;padding:6px 0 max(env(safe-area-inset-bottom),10px);z-index:100}
.tb{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 10px;opacity:.35;transition:all .35s cubic-bezier(.4,0,.2,1);font-size:9px;font-weight:700;color:var(--navy)}
.tb.on{opacity:1;transform:scale(1.08);color:var(--gold2)}
.tb.on i{filter:drop-shadow(0 2px 4px rgba(212,168,83,.4))}
.tb i{font-size:22px;font-style:normal;transition:all .35s}

/* PAGE TRANSITIONS */
.page{opacity:0;transform:translateY(12px);transition:opacity .4s ease,transform .4s ease}
.page.active{opacity:1;transform:none}

/* GLASS CARD */
.gcard{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;transition:transform .2s}
.gcard:active{transform:scale(.985)}

/* MAP */
.map-wrap{position:relative;width:calc(100% - 32px);margin:0 auto 14px;border-radius:var(--r);overflow:hidden;border:1px solid rgba(212,168,83,.2);box-shadow:var(--shadow)}
.map-wrap .mapboxgl-map{width:100%;height:260px}
.map-wrap.exp .mapboxgl-map{width:100%!important;height:100%!important}
.map-wrap.exp{position:relative!important;width:100%!important;height:100%!important;max-width:none!important;margin:0!important;border-radius:0!important;border:none!important}
.fs-btn{position:absolute;top:12px;right:12px;z-index:10;width:36px;height:36px;border-radius:var(--r3);background:var(--glass);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:var(--shadow2);transition:all .2s}
.fs-btn:active{transform:scale(.88)}
.cls-fs{position:fixed;top:16px;right:16px;z-index:100000;width:48px;height:48px;border-radius:50%;background:rgba(10,22,40,.7);color:#fff;border:2px solid rgba(255,255,255,.25);font-size:24px;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.map-wrap.exp .cls-fs{display:flex}
.map-wrap.exp .fs-btn{display:none}
.map-wrap.exp .ml{display:none}
.ml{position:absolute;bottom:10px;left:10px;right:10px;background:rgba(10,22,40,.6);color:var(--goldL);border-radius:var(--r3);padding:6px 12px;font-size:10px;text-align:center;font-weight:600;z-index:5;backdrop-filter:blur(4px)}
.map-popup .mapboxgl-popup-content{border-radius:var(--r2);padding:10px 14px;box-shadow:var(--shadow);max-width:220px;direction:rtl;text-align:right;font-family:Heebo,sans-serif;border:1px solid rgba(212,168,83,.15)}

/* SCHEDULE */
.sch-item{display:flex;gap:12px;padding:10px 0;border-radius:var(--r2);transition:all .3s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative}
.sch-item:active{transform:scale(.97)}
.sch-item.on{background:var(--goldL);padding:10px 12px;margin:0 -12px 2px;box-shadow:0 4px 16px rgba(212,168,83,.15)}
.sch-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .3s}
.sch-item.on .sch-ico{transform:scale(1.15);box-shadow:0 4px 12px rgba(0,0,0,.12)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(212,168,83,.5)}70%{box-shadow:0 0 0 14px rgba(212,168,83,0)}100%{box-shadow:0 0 0 0 rgba(212,168,83,0)}}
.mkr{width:30px;height:30px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.25);transition:all .3s;cursor:pointer}
.mkr.on{animation:pulse 1.5s infinite;transform:scale(1.35)}

/* DAY SELECTOR */
.dsel{display:flex;overflow-x:auto;gap:6px;padding:12px 12px 8px;scrollbar-width:none}
.dsel::-webkit-scrollbar{display:none}
.dsel button{min-width:46px;height:46px;border-radius:var(--r2);border:1.5px solid rgba(212,168,83,.2);background:var(--glass);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;transition:all .25s}
.dsel button.on{border-color:var(--gold);background:var(--goldL);box-shadow:0 4px 16px rgba(212,168,83,.2)}
.dsel button span:first-child{font-size:15px}
.dsel button span:last-child{font-size:9px;font-weight:800}

/* HERO */
.hero{padding:24px 20px 20px;color:#fff;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.3));pointer-events:none}
.hero>*{position:relative;z-index:1}
.hero .ico{font-size:42px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.2))}
.hero h2{font-size:24px;font-weight:800;margin:6px 0 2px;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.hero .sub{font-size:12px;opacity:.85;font-weight:300}

/* LINKS */
.lrow{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--glass);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.5);border-radius:var(--r2);margin-bottom:7px;transition:all .2s;box-shadow:var(--shadow2)}
.lrow:active{background:var(--goldL);transform:scale(.98)}

/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}

/* BUDGET */
.bbar{background:rgba(10,22,40,.06);border-radius:8px;height:8px;overflow:hidden;margin:4px 0}
.bbar-f{height:100%;border-radius:8px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.total{border-radius:var(--r);padding:24px 20px;color:#fff;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.total::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.12),transparent 60%);pointer-events:none}

/* PHOTO */
.modal{position:fixed;inset:0;z-index:10000;background:rgba(10,22,40,.92);display:none;align-items:center;justify-content:center;flex-direction:column;padding:20px;backdrop-filter:blur(8px)}
.modal.show{display:flex}
.modal img{max-width:100%;max-height:70vh;border-radius:var(--r);object-fit:cover;box-shadow:0 16px 48px rgba(0,0,0,.4)}
.modal .mc{color:var(--goldL);font-size:15px;font-weight:600;margin-top:12px;text-align:center;font-family:'Playfair Display',serif}
.modal .mx{position:absolute;top:max(env(safe-area-inset-top),14px);right:14px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);font-size:22px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.ph-thumb{width:56px;height:56px;border-radius:var(--r3);object-fit:cover;cursor:pointer;border:2px solid var(--goldL);box-shadow:0 4px 12px rgba(0,0,0,.1);transition:all .25s;flex-shrink:0}
.ph-thumb:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(0,0,0,.15)}

/* CHECKLIST */
.chk{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(212,168,83,.08);cursor:pointer;transition:all .2s}
.chk:active{background:var(--goldL);margin:0 -8px;padding:11px 8px;border-radius:var(--r3)}
.chk-box{width:26px;height:26px;border-radius:9px;border:2px solid rgba(212,168,83,.3);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .25s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.chk.done .chk-box{background:var(--gold);border-color:var(--gold);color:#fff;transform:scale(1.1)}
.chk.done .chk-txt{text-decoration:line-through;color:var(--txt3)}

/* WHATSAPP */
.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:linear-gradient(135deg,#25D366,#20BA5C);color:#fff;border-radius:var(--r2);border:none;font-size:14px;font-weight:700;width:100%;margin-top:14px;font-family:inherit;box-shadow:0 4px 16px rgba(37,211,102,.3);transition:all .2s}
.wa-btn:active{transform:scale(.97);box-shadow:0 2px 8px rgba(37,211,102,.2)}

/* SPOTIFY */
.spotify-btn{display:flex;align-items:center;gap:10px;padding:14px;background:linear-gradient(135deg,#1DB954,#169C46);color:#fff;border-radius:var(--r2);margin-top:12px;box-shadow:0 4px 16px rgba(29,185,84,.25);transition:all .2s}
.spotify-btn:active{transform:scale(.97)}

/* WEATHER */
.wx{display:flex;gap:8px;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.wx::-webkit-scrollbar{display:none}
.wx-card{flex-shrink:0;background:var(--glass);backdrop-filter:blur(8px);border-radius:var(--r2);padding:10px 14px;text-align:center;border:1px solid rgba(255,255,255,.5);min-width:75px;box-shadow:var(--shadow2)}

/* CANVAS */
#cdCanvas{display:block;margin:0 auto}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
.fade-up{animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
.fade-up:nth-child(2){animation-delay:.06s}
.fade-up:nth-child(3){animation-delay:.12s}
.fade-up:nth-child(4){animation-delay:.18s}
.fade-up:nth-child(5){animation-delay:.24s}
.fade-up:nth-child(6){animation-delay:.3s}
.fade-up:nth-child(7){animation-delay:.36s}
.fade-up:nth-child(8){animation-delay:.42s}

/* SECTION TITLES */
.sec-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--navy);margin-bottom:10px;text-align:right;display:flex;align-items:center;gap:8px;justify-content:flex-end}
.sec-title::before{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(212,168,83,.3))}

/* REGION BADGE */
.reg-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;color:#fff}

/* ALERT BOX */
.alert{border-radius:var(--r2);padding:16px;margin-bottom:14px;border:1px solid}

/* BASE CARD */
.bc{border-radius:var(--r);padding:14px 10px;text-align:center;border:1.5px solid;background:var(--glass);backdrop-filter:blur(8px);transition:transform .2s;box-shadow:var(--shadow2)}
.bc:active{transform:scale(.96)}

/* RESPONSIVE DESKTOP */
@media(min-width:500px){
  body{max-width:720px}
  .grid2{grid-template-columns:repeat(4,1fr)}
  .hero{border-radius:var(--r);margin:0 16px}
  .map-wrap .mapboxgl-map{height:360px}
  .dsel{padding:12px 16px 8px}
  .sch-item{padding:12px 0}
  .sch-ico{width:42px;height:42px;font-size:19px}
  .gcard{padding:20px}
  .total{padding:28px 24px}
  .lrow{padding:14px 18px}
  .sec-title{font-size:20px}
  .bc{padding:18px 12px}
}
@media(min-width:768px){
  body{max-width:900px}
  .hero h2{font-size:28px}
  .map-wrap .mapboxgl-map{height:420px}
}
</style>
</head>
<body>
<div class="hdr"><h1 id="hdrT">🇮🇹 צוקרמניה באיטליה</h1></div>

<script>
const MBT='pk.eyJ1Ijoicm9pZXoiLCJhIjoiY2t2YjVqeGZpMDNxZDJ4bXB1dWp1MTNocyJ9.3vPeZHCVkHEkxrCz6Eb4OA';
mapboxgl.accessToken=MBT;
const TRIP=new Date('2026-09-22T18:00:00+03:00');

// WIKI PHOTOS
const PHOTO_WIKI={'duomo':'Milan_Cathedral','galleria':'Galleria_Vittorio_Emanuele_II','castello':'Sforza_Castle','navigli':'Navigli','como':'Bellagio,_Lombardy','brunate':'Brunate','swiss':'Swissminiatur','foxtown':'Mendrisio','bergamo':'Bergamo','ortisei':'Ortisei','siusi':'Seiser_Alm','seceda':'Seceda','braies':'Pragser_Wildsee','plose':'Plose','otzi':'%C3%96tzi','gardaland':'Gardaland','verona':'Verona_Arena','sirmione':'Sirmione','venezia':'Venice','rialto':'Rialto_Bridge','sanmarco':'St_Mark%27s_Square','baldo':'Monte_Baldo','safari':'Parco_Natura_Viva'};
const PHOTO_LABELS={'duomo':'דואומו','galleria':'גלריה','castello':'Castello','navigli':'Navigli','como':'בלאג\'ו','brunate':'ברונאטה','swiss':'Swiss Miniatur','foxtown':'FoxTown','bergamo':'ברגמו','ortisei':'אורטיזיי','siusi':'אלפה','seceda':'סצ\'דה','braies':'בראייס','plose':'Plose','otzi':'אוצי','gardaland':'גארדלנד','verona':'ורונה','sirmione':'סירמיונה','venezia':'ונציה','rialto':'ריאלטו','sanmarco':'סן מרקו','baldo':'Monte Baldo','safari':'Natura Viva'};
const PHOTOS={};
async function loadPh(k){if(PHOTOS[k])return PHOTOS[k];const a=PHOTO_WIKI[k];if(!a)return null;try{const r=await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+a);const d=await r.json();if(d.thumbnail){const u=d.thumbnail.source.replace(/\/\d+px-/,'/600px-');PHOTOS[k]=[u,PHOTO_LABELS[k]||k];return PHOTOS[k];}}catch(e){}return null;}
async function preload(){await Promise.allSettled(Object.keys(PHOTO_WIKI).map(k=>loadPh(k)))}
preload();
const SCH_PH={'דואומו':'duomo','גלריה':'galleria','Castello':'castello','Navigli':'navigli','ברונאטה':'brunate','בלאג\'ו':'como','Swiss':'swiss','FoxTown':'foxtown','ברגמו':'bergamo','אורטיזיי':'ortisei','Mont Sëuc':'siusi','אלפה':'siusi','סצ\'דה':'seceda','Fermeda':'seceda','בראייס':'braies','Plose':'plose','אוצי':'otzi','Peppa':'gardaland','Oblivion':'gardaland','Mammut':'gardaland','SEA LIFE':'gardaland','ארנה':'verona','יוליה':'verona','סירמיונה':'sirmione','סן מרקו':'sanmarco','ריאלטו':'rialto','גונדולה':'venezia','מוראנו':'venezia','Tronchetto':'venezia','Monte Baldo':'baldo','Franciacorta':'foxtown','ספארי':'safari','דינוזאורים':'safari','Natura':'safari','Eataly':'duomo','מוזיאון המדע':'castello','La Rinascente':'duomo','Buenos':'galleria','Monte Brè':'swiss','לוגאנו':'swiss','Mountaincarts':'plose','מזחלת':'plose'};
function getPh(n){for(const[k,v]of Object.entries(SCH_PH)){if(n.includes(k))return PHOTOS[v]?v:null;}return null;}


// ATTRACTION DESCRIPTIONS IN HEBREW
const ATTR_DESC={
'דואומו':'הקתדרלה הגותית הגדולה ביותר באיטליה ומהגדולות בעולם! 135 צריחים, 3,400 פסלים, גג מדהים עם נוף 360° על מילאנו. נבנתה לאורך 600 שנה! מומלץ לעלות לגג ברגל (€10) או במעלית (€14). הגעה מוקדמת מונעת תורים.',
'גלריה':'הקניון הסגור העתיק בעולם, נבנה ב-1867. תקרת זכוכית מרהיבה, חנויות יוקרה: Prada, Gucci, Louis Vuitton. טיפ: עמדו על השור בפסיפס ברצפה והסתובבו על העקב — מביא מזל! כניסה חינם.',
'Castello':'מבצר מהמאה ה-15 שהיה בית למשפחת ספורצה. מוזיאונים, פארק סמפיונה מאחור — מושלם לרומי לרוץ! כרטיס מוזיאונים €5. הגנים חינם.',
'Navigli':'אזור התעלות של מילאנו — האווירה הכי שווה בעיר! שוק פשפשים בימי ראשון, מסעדות ובארים על התעלה. הכי יפה בשקיעה. ארוחה: 15-25€/אדם.',
'ברונאטה':'הפוניקולר עולה 7 דק\'! מלמעלה — נוף מדהים על אגם קומו, האלפים ומילאנו. מסעדות עם מרפסות. טיפ: לכו לנקודת התצפית Faro Voltiano. כרטיס הלוך-חזור 7€.',
'בלאג\'ו':'הנקודה הכי יפה באגם קומו — חצי אי בין שני זרועות האגם. רחובות מרוצפים, וילות מפוארות, גני וילה מלצי. ג\'לאטו ב-Punta Spartivento. מגיעים במעבורת 45 דק\'.',

function drawCD(canvas){
  const ctx=canvas.getContext('2d');const w=canvas.width=200,h=canvas.height=200;
  const now=new Date(),diff=TRIP-now;
  if(diff<=0){ctx.font='bold 24px Playfair Display';ctx.fillStyle='#D4A853';ctx.textAlign='center';ctx.fillText('!הטיול התחיל',100,105);return}
  const days=Math.floor(diff/864e5),hrs=Math.floor((diff%864e5)/36e5),mins=Math.floor((diff%36e5)/6e4);
  const totalDays=Math.ceil((TRIP-new Date('2025-01-01'))/864e5);
  const progress=1-(diff/(totalDays*864e5));
  // Clear
  ctx.clearRect(0,0,w,h);
  // Background ring
  ctx.beginPath();ctx.arc(100,100,85,0,Math.PI*2);ctx.strokeStyle='rgba(212,168,83,.12)';ctx.lineWidth=8;ctx.stroke();
  // Progress ring
  const startAngle=-Math.PI/2;const endAngle=startAngle+progress*Math.PI*2;
  ctx.beginPath();ctx.arc(100,100,85,startAngle,endAngle);
  const grad=ctx.createLinearGradient(0,0,200,200);grad.addColorStop(0,'#D4A853');grad.addColorStop(1,'#C49A42');
  ctx.strokeStyle=grad;ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke();
  // Glow dot at end
  const dotX=100+85*Math.cos(endAngle),dotY=100+85*Math.sin(endAngle);
  ctx.beginPath();ctx.arc(dotX,dotY,6,0,Math.PI*2);ctx.fillStyle='#D4A853';ctx.fill();
  ctx.beginPath();ctx.arc(dotX,dotY,10,0,Math.PI*2);ctx.fillStyle='rgba(212,168,83,.25)';ctx.fill();
  // Text
  ctx.textAlign='center';
  ctx.font='800 36px Playfair Display';ctx.fillStyle='#0A1628';ctx.fillText(days,100,92);
  ctx.font='600 13px Heebo';ctx.fillStyle='#8A8A9A';ctx.fillText('ימים',100,110);
  ctx.font='500 12px Heebo';ctx.fillStyle='#D4A853';ctx.fillText(`${hrs} שעות ${mins} דקות`,100,130);
}

  const totalAttr=DAYS.reduce((s,d)=>s+d.sc.length,0);
  let h=`<div class="fade-up" style="text-align:center;padding:20px 0 12px"><div style="font-size:52px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.1))">🇮🇹</div><h1 class="display" style="font-size:30px;font-weight:800;color:var(--navy);margin:6px 0 2px">צוקרמניה באיטליה</h1><p style="font-size:13px;color:var(--txt3);font-weight:300">22 ספטמבר — 4 אוקטובר 2026</p><p style="font-size:12px;color:var(--gold2);font-weight:600;margin-top:4px">רועי • עדי • רומי • נועם • עמית • מאיה</p></div>`;
  // CANVAS COUNTDOWN
  h+=`<div class="fade-up gcard" style="text-align:center;padding:20px"><div style="font-size:11px;color:var(--gold2);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px">⏱ ספירה לאחור</div><canvas id="cdCanvas" width="200" height="200"></canvas></div>`;
  // DASHBOARD
  h+=`<div class="fade-up" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">`;
  [{v:'13',l:'ימים',i:'📅'},{v:'1,500',l:"ק\"מ",i:'🚗'},{v:totalAttr,l:'פעילויות',i:'🎯'},{v:'4',l:'מדינות',i:'🌍'}].forEach(s=>{
    h+=`<div class="gcard" style="padding:10px 4px;text-align:center;margin-bottom:0"><div style="font-size:18px">${s.i}</div><div style="font-size:20px;font-weight:900;color:var(--navy)">${s.v}</div><div style="font-size:9px;color:var(--txt3);font-weight:600">${s.l}</div></div>`
  });h+=`</div>`;
  // BASES
  h+=`<div class="fade-up grid2">`;BAS.forEach(b=>{h+=`<div class="bc" style="border-color:${b.ch}30;background:linear-gradient(145deg,${b.ch}10,var(--glass))"><div style="font-size:30px">${b.i}</div><div style="font-size:16px;font-weight:800;margin-top:4px">${b.n}</div><div style="font-size:11px;color:var(--txt3)">${b.ng} לילות</div><div style="font-size:10px;font-weight:700;color:${b.ch}">${b.dt}</div></div>`});h+=`</div>`;
  // MAP
  h+=`<div class="fade-up map-wrap" id="mwO"><button class="fs-btn" onclick="toggleFS('mwO')">⛶</button><button class="cls-fs" onclick="toggleFS('mwO')">✕</button><div id="mapO"></div><div class="ml">⛶ מסך מלא • גררו וזומו</div></div>`;
  // BUDGET
  h+=`<div class="fade-up total" style="background:linear-gradient(135deg,var(--navy),var(--navy2))"><div style="font-size:11px;opacity:.6;letter-spacing:1px">תקציב משוער</div><div class="display" style="font-size:38px;font-weight:900">~€7,000</div><div style="font-size:11px;opacity:.5;margin-top:2px">ללא טיסות וקניות</div></div>`;
  // DAYS
  h+=`<div class="fade-up sec-title">לו"ז מפורט</div>`;
  DAYS.forEach(d=>{h+=`<button onclick="gD(${d.day-1})" class="fade-up" style="width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--glass);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.5);border-radius:var(--r2);margin-bottom:8px;text-align:right;font-family:inherit;box-shadow:var(--shadow2);transition:all .2s"><div style="width:40px;height:40px;border-radius:12px;background:${d.gr};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 4px 12px ${d.clh}30">${d.ic}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700;color:var(--navy)">יום ${d.day} — ${d.t}</div><div style="font-size:10px;color:var(--txt3);margin-top:1px">${d.dt} • ${d.drv}</div></div><span style="color:var(--gold);font-size:16px">←</span></button>`});
  el.innerHTML=h;
  setTimeout(()=>{mkOv('mapO');const cv=document.getElementById('cdCanvas');if(cv)drawCD(cv)},200);
  setInterval(()=>{const cv=document.getElementById('cdCanvas');if(cv&&cTab==='H')drawCD(cv)},60000);
}

// ===== RENDER DAY =====
function rD(){
  const d=DAYS[cDay];document.getElementById('hdrT').textContent=`${d.ic} יום ${d.day} — ${d.t}`;
  const el=document.getElementById('pD');
  let h=`<div class="dsel">`;DAYS.forEach((day,i)=>{h+=`<button onclick="gD(${i})" class="${cDay===i?'on':''}" style="${cDay===i?'border-color:'+day.clh:''}"><span>${day.ic}</span><span style="color:${cDay===i?day.clh:'var(--txt3)'}">${day.day}</span></button>`});h+=`</div>`;
  h+=`<div class="hero" style="background:${d.gr}"><div class="ico">${d.ic}</div><h2 class="display">${d.t}</h2><p class="sub">יום ${d.day} • ${d.dt}</p><div style="display:flex;justify-content:center;gap:24px;margin-top:12px"><div><div style="font-size:10px;opacity:.6">נסיעה</div><div style="font-size:13px;font-weight:700">${d.drv}</div></div><div><div style="font-size:10px;opacity:.6">עלות</div><div style="font-size:13px;font-weight:700">${d.cost}</div></div></div></div>`;
  h+=`<div style="margin:10px 16px"><div style="font-size:12px;font-weight:700;color:var(--gold2);margin-bottom:4px">🌤️ תחזית</div><div class="wx" id="wxD"></div></div>`;
  h+=`<div style="margin:8px 16px" class="gcard"><div style="font-size:12px;font-weight:700;color:${d.clh}">🛣️ ${d.rt}</div></div>`;
  h+=`<div class="map-wrap" id="mwD" style="margin:0 16px 14px"><button class="fs-btn" onclick="toggleFS('mwD')">⛶</button><button class="cls-fs" onclick="toggleFS('mwD')">✕</button><div id="mapD"></div><div class="ml">📍 לחצו פעילות → המפה תעוף!</div></div>`;
  h+=`<div style="padding:0 16px"><div class="sec-title">לו"ז</div>`;
  d.sc.forEach((s,i)=>{const pk=getPh(s.a);
    // Find matching description
    let desc='';
    for(const[k,v]of Object.entries(ATTR_DESC)){if(s.a.includes(k)){desc=v;break;}}
    h+=`<div class="sch-item fade-up" onclick="${s.ln?'flyTo('+i+')':''}"><div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0"><div class="sch-ico" style="background:${d.clh}15">${s.i}</div>${i<d.sc.length-1?`<div style="width:2px;flex:1;background:linear-gradient(${d.clh}30,${d.clh}08);margin-top:3px"></div>`:''}</div><div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:flex-start"><span style="font-size:14px;font-weight:700;color:var(--navy)">${s.a}${s.ln?' 📍':''}</span><span style="font-size:10px;font-weight:700;color:${d.clh};flex-shrink:0">${s.t}</span></div>${s.d?`<p style="font-size:11px;color:var(--txt2);margin-top:2px">${s.d}</p>`:''}${desc?`<button onclick="event.stopPropagation();this.nextElementSibling.classList.toggle('hide');this.textContent=this.nextElementSibling.classList.contains('hide')?'ℹ️ פרטים נוספים':'▲ סגור'" style="font-size:11px;color:var(--gold2);font-weight:600;background:none;border:none;padding:3px 0;font-family:inherit">ℹ️ פרטים נוספים</button><div class="hide" style="font-size:12px;color:var(--txt2);line-height:1.6;margin-top:4px;padding:10px 12px;background:var(--bg2);border-radius:var(--r3);border-right:3px solid ${d.clh}">${desc}</div>`:''}${s.u?`<a href="${s.u}" target="_blank" style="font-size:11px;color:var(--gold2);font-weight:600;display:inline-block;margin-top:2px" onclick="event.stopPropagation()">🔗 כרטיסים</a>`:''}</div>${pk?`<img class="ph-thumb" data-w="${pk}" onerror="this.hidden=true" onclick="event.stopPropagation();showPh('${pk}')">`:''}</div>`;});
  h+=`</div>`;
  if(d.lk.length){h+=`<div style="padding:8px 16px 0"><div class="sec-title">קישורים</div>`;d.lk.forEach(l=>{h+=`<a href="${l.u}" target="_blank" class="lrow"><span style="font-size:13px;font-weight:600">${l.n}</span><span style="font-size:11px;color:var(--gold2);font-weight:600">פתח →</span></a>`});h+=`</div>`}
  if(d.stay){h+=`<div style="margin:14px 16px 0" class="gcard"><div style="font-size:13px;font-weight:800;color:var(--navy)">🏠 ${d.stay}</div></div>`}
  const sp=SPOTIFY[d.base];if(sp)h+=`<a href="${sp}" target="_blank" class="spotify-btn" style="margin:14px 16px 0"><span style="font-size:22px">🎵</span><div><div style="font-size:13px;font-weight:700">פלייליסט ${d.base}</div><div style="font-size:10px;opacity:.8">Spotify</div></div></a>`;
  h+=`<div style="padding:0 16px"><button class="wa-btn" onclick="shareWA(${cDay})">📱 שתף יום ${d.day} בוואטסאפ</button></div>`;
  el.innerHTML=h;
  setTimeout(async()=>{mkMap('mapD',d);if(d.wLat)fetchWx(d.wLat,d.wLon,document.getElementById('wxD'));
    document.querySelectorAll('.ph-thumb[data-w]').forEach(async img=>{const k=img.dataset.w;const p=PHOTOS[k]||await loadPh(k);if(p)img.src=p[0];else img.hidden=true})},200);
}

// ===== BUDGET =====
let rates={};
function rB(){
  const el=document.getElementById('pB');const tot=BDG.reduce((s,b)=>s+b.a,0);
  let h=`<div class="fade-up total" style="background:linear-gradient(135deg,var(--navy),var(--navy2))"><div style="font-size:11px;opacity:.6;letter-spacing:1px">סה"כ ללא טיסות</div><div class="display" style="font-size:44px;font-weight:900">€${tot.toLocaleString()}</div><div style="font-size:11px;opacity:.45">עם טיסות: ~€8,500-9,500</div></div>`;
  BDG.forEach((b,i)=>{const p=(b.a/tot*100);const col=`hsl(${35+i*12},${65-i*3}%,${50+i*3}%)`;
    h+=`<div class="fade-up" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:14px;font-weight:700">${b.i} ${b.c}</span><span style="font-size:15px;font-weight:800;color:var(--navy)">€${b.a.toLocaleString()}</span></div><div class="bbar"><div class="bbar-f" style="background:${col};width:${p}%"></div></div></div>`});
  h+=`<div class="fade-up gcard"><div class="sec-title" style="margin-bottom:12px">💱 מחשבון מטבעות</div><div style="display:flex;gap:8px;margin-bottom:12px"><input type="number" id="ccA" value="100" style="flex:1;padding:12px;border:2px solid var(--goldL);border-radius:var(--r3);font-size:16px;font-weight:700;font-family:inherit;text-align:center;background:var(--bg);color:var(--navy)" oninput="calcCC()"><select id="ccF" style="padding:12px;border:2px solid var(--goldL);border-radius:var(--r3);font-size:14px;font-family:inherit;background:var(--bg);color:var(--navy)" onchange="calcCC()"><option value="EUR">🇪🇺 EUR</option><option value="CHF">🇨🇭 CHF</option><option value="ILS">🇮🇱 ILS</option></select></div><div id="ccR" style="text-align:center">טוען...</div></div>`;
  el.innerHTML=h;loadRates();
}
async function loadRates(){rates=await fetchRates();calcCC()}
function calcCC(){const a=parseFloat(document.getElementById('ccA').value)||0;const f=document.getElementById('ccF').value;const r=document.getElementById('ccR');if(!rates.CHF){r.textContent='טוען...';return}
  let e=a;if(f==='CHF')e=a/rates.CHF;else if(f==='ILS')e=a/rates.ILS;
  r.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">${[{c:'🇪🇺',v:e.toFixed(1),l:'EUR'},{c:'🇨🇭',v:(e*rates.CHF).toFixed(1),l:'CHF'},{c:'🇮🇱',v:(e*rates.ILS).toFixed(1),l:'ILS'}].map(x=>`<div style="background:var(--bg2);border-radius:var(--r3);padding:10px"><div style="font-size:10px;color:var(--txt3)">${x.c} ${x.l}</div><div style="font-size:20px;font-weight:800;color:var(--navy)">${x.v}</div></div>`).join('')}</div>`}

// ===== TOOLS =====
function rT(){
  const el=document.getElementById('pT');
  const total=CHKLIST.reduce((s,c)=>s+c.items.length,0);
  const done=Object.keys(checked).filter(k=>checked[k]).length;
  const pct=Math.round(done/total*100);
  let h=`<div class="fade-up" style="text-align:center;margin-bottom:16px"><div style="font-size:36px">📋</div><h2 class="display" style="font-size:22px;color:var(--navy)">צ'קליסט אריזה</h2><div style="font-size:13px;color:var(--txt3);margin-top:4px">${done}/${total} — ${pct}%</div><div class="bbar" style="margin:10px auto;width:80%"><div class="bbar-f" style="background:linear-gradient(90deg,var(--gold),var(--gold2));width:${pct}%"></div></div></div>`;
  CHKLIST.forEach((cat,ci)=>{h+=`<div class="fade-up gcard"><h3 style="font-size:15px;font-weight:800;color:var(--navy);margin-bottom:8px">${cat.cat}</h3>`;
    cat.items.forEach((item,ii)=>{const k=`${ci}-${ii}`;const dn=checked[k];h+=`<div class="chk${dn?' done':''}" onclick="tgChk('${k}')"><div class="chk-box">${dn?'✓':''}</div><div class="chk-txt" style="font-size:13px">${item}</div></div>`});h+=`</div>`});
  h+=`<div class="fade-up gcard"><h3 style="font-size:15px;font-weight:800;color:var(--navy);margin-bottom:8px">🎵 פלייליסטים</h3>`;
  Object.entries(SPOTIFY).forEach(([k,v])=>{h+=`<a href="${v}" target="_blank" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(212,168,83,.08)"><span style="width:32px;height:32px;border-radius:50%;background:#1DB954;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px">🎵</span><div style="flex:1;font-size:13px;font-weight:600;color:var(--navy)">${k}</div><span style="font-size:10px;color:#1DB954;font-weight:600">Spotify →</span></a>`});
  h+=`</div>`;el.innerHTML=h;
}
function tgChk(k){checked[k]=!checked[k];saveCk();rT()}

// ===== INFO =====
function rI(){
  const el=document.getElementById('pI');
  let h=`<h2 class="fade-up display" style="font-size:22px;color:var(--navy);text-align:center;margin-bottom:16px">מידע מעשי</h2>`;
  h+=`<div class="fade-up sec-title">הזמנות מראש</div>`;
  BKS.forEach(b=>{h+=`<a href="${b.u}" target="_blank" class="fade-up" style="display:flex;align-items:center;gap:12px;padding:14px;background:${b.ur?'rgba(232,102,106,.06)':'var(--glass)'};backdrop-filter:blur(8px);border:1px solid ${b.ur?'rgba(232,102,106,.2)':'rgba(255,255,255,.5)'};border-radius:var(--r2);margin-bottom:8px;box-shadow:var(--shadow2)"><div style="width:38px;height:38px;border-radius:var(--r3);background:${b.ur?'var(--milan)':'#2ECC71'};display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:800;flex-shrink:0">${b.ur?'!':'✓'}</div><div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--navy)">${b.w}</div><div style="font-size:11px;color:${b.ur?'var(--milan)':'var(--txt3)'}">${b.wh}</div></div><span style="font-size:11px;color:var(--gold2)">🔗</span></a>`});
  h+=`<div class="fade-up alert" style="background:rgba(232,102,106,.06);border-color:rgba(232,102,106,.2);margin-top:16px"><div style="font-size:14px;font-weight:800;color:#991B1B">⚠️ ZTL — 80-335€!</div><div style="font-size:12px;color:#7F1D1D;margin-top:4px;line-height:1.6">מצלמות בכל מרכז. חנו בפריפריה!<br>• מילאנו: Area C<br>• ורונה: Cittadella<br>• ונציה: Tronchetto חובה!</div></div>`;
  h+=`<div class="fade-up sec-title" style="margin-top:16px">מזג אוויר</div>`;
  [{a:"אגמים",t:"18-24°C",i:"☀️"},{a:"אורטיזיי",t:"13-20°C",i:"⛅"},{a:"פסגות",t:"5-13°C",i:"🥶"}].forEach(w=>{h+=`<div class="fade-up lrow"><span style="font-size:13px;font-weight:600">${w.a}</span><span style="font-size:14px;font-weight:800;color:var(--navy)">${w.i} ${w.t}</span></div>`});
  h+=`<div class="fade-up sec-title" style="margin-top:16px">טיפים</div>`;
  ["חניה: לבן=חינם, כחול=תשלום, צהוב=אסור","דלק Gasolio=דיזל. fai da te","בוסטר רומי חובה","רישיון בינלאומי חובה","הצהירו שוויץ בהשכרה","ונציה: ואפורטו בלבד!"].forEach((t,i)=>{h+=`<div class="fade-up" style="padding:10px 14px;background:${i%2?'var(--glass)':'var(--bg2)'};border-radius:var(--r3);margin-bottom:5px;font-size:12px;color:var(--txt2)">• ${t}</div>`});
  h+=`<div class="fade-up" style="text-align:center;margin-top:28px;padding:20px;background:var(--glass);backdrop-filter:blur(12px);border-radius:var(--r);border:1px solid rgba(212,168,83,.15)"><div style="font-size:36px">🇮🇹</div><div class="display" style="font-size:22px;font-weight:800;color:var(--navy);margin-top:4px">!צוקרמניה באיטליה</div><div style="font-size:13px;color:var(--gold2);margin-top:4px">רועי • עדי • רומי • נועם • עמית • מאיה</div></div>`;
  el.innerHTML=h;
}

// INIT
rH();rB();rI();
// Hide non-active pages initially
['pD','pB','pT','pI'].forEach(id=>{document.getElementById(id).style.display='none'});
</script>
